<emp-ng-spinner #spinner [visible]="isLoadingSelection">

</emp-ng-spinner>

<div class="explorer">

  <emp-ng-provisions-explorer
    class="primary"
    [class.std-hide]="displayTabbedView"
    [queryType]="queryType"
    [query]="query"
    [dataList]="dataList"
    [selectedUID]="selectedData.order.order.uid"
    [isLoading]="isLoading"
    [queryExecuted]="queryExecuted"
    (provisionsExplorerEvent)="onProvisionsExplorerEvent($event)">

  </emp-ng-provisions-explorer>

  <emp-ng-order-tabbed-view *ngIf="displayTabbedView"
    class="secondary priority std-stacked"
    [config]="selectedData.config"
    [data]="selectedData.order"
    [readonly]="true"
    (orderTabbedViewEvent)="onOrderTabbedViewEvent($event)">

  </emp-ng-order-tabbed-view>

</div>
