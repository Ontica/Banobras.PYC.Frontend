<div class="card card-border">

  <div class="card-header card-header-flat">

    <div class="card-title">
      Explorador de provisiones

      <div class="card-hint" empNgProgressText
        loadingText="Cargando"
        [finalText]="hint"
        [isLoading]="isLoading">
      </div>

    </div>

  </div>

  <div class="card-body" [empNgSpinnerHost]="spinner">

    <div class="fx-column-container-fill">

      <emp-ng-spinner #spinner [visible]="isLoading">

      </emp-ng-spinner>

      <emp-ng-provisions-filter class="fx-item-none"
        [queryType]="queryType"
        [query]="query"
        [(showFilters)]="showFilters"
        (provisionsFilterEvent)="onProvisionsFilterEvent($event)">

      </emp-ng-provisions-filter>

      <emp-ng-provisions-data class="fx-item"
        [queryType]="queryType"
        [dataList]="dataList"
        [selectedUID]="selectedUID"
        [queryExecuted]="queryExecuted"
        (provisionsDataEvent)="onProvisionsDataEvent($event)">

      </emp-ng-provisions-data>

    </div>

  </div>

</div>
